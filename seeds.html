<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.land · 种子</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --card: #ffffff;
    --text: #333;
    --text-light: #8a9080;
    --text-muted: #b8bfb0;
    --accent: #6a9a5b;
    --accent-soft: #e2eddc;
    --border: #e4e8e0;
  }
  html, body { margin:0; padding:0; height:100%; }
  body {
    font-family:'Noto Sans SC',sans-serif;
    color:var(--text); line-height:1.7; font-weight:300;
    min-height:100vh; overflow-x:hidden;
  }
  body::before {
    content:'';
    position:fixed; top:0; left:0;
    width:100vw; height:100vh; z-index:-1;
    background:url('bg-desktop.jpg') center/cover no-repeat;
    background-color:#2a5a28;
  }
  @media (max-width:700px) {
    body::before { background-image:url('bg-mobile.jpg'); }
  }
  .page-scroll { position:relative; z-index:1; padding-bottom:2rem; }

  .header { text-align:center; padding:5rem 2rem 2rem; }
  .header h1 {
    font-family:'Noto Serif SC',serif; font-weight:600;
    font-size:4.5rem; letter-spacing:0.15em;
    color:#fff; margin-bottom:0.4rem;
    text-shadow:0 4px 30px rgba(0,0,0,0.4), 0 1px 3px rgba(0,0,0,0.3);
  }
  .header .sub {
    color:rgba(255,255,255,0.9); font-size:1rem;
    letter-spacing:0.18em; text-shadow:0 2px 12px rgba(0,0,0,0.3);
    font-weight:300;
  }

  /* ── Seed field container ── */
  .seed-field-card {
    max-width:750px; margin:1.2rem auto;
    background:rgba(255,255,255,0.93);
    border-radius:12px;
    box-shadow:0 2px 16px rgba(0,0,0,0.08);
    padding:2rem 1.5rem;
  }
  .section-head { text-align:center; margin-bottom:1.5rem; }
  .section-head .div { width:32px; height:1px; background:var(--border); margin:0 auto 1.2rem; }
  .section-head h2 { font-family:'Noto Serif SC',serif; font-weight:400; font-size:1.1rem; color:var(--text); margin-bottom:0.3rem; }
  .section-head p { color:var(--text-light); font-size:0.82rem; }

  /* ── Bubble field ── */
  .bubble-field {
    position:relative;
    width:100%;
    height:360px;
    margin:0 auto;
    overflow:hidden;
  }

  .bubble {
    position:absolute;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.4s;
    text-align:center;
    user-select:none;
  }
  .bubble .label {
    font-family:'Noto Serif SC',serif;
    color:var(--text);
    line-height:1.3;
    pointer-events:none;
  }
  .bubble:hover {
    transform:scale(1.12);
    z-index:10;
  }

  /* size tiers */
  .bubble.tier-1 { width:60px; height:60px; background:rgba(226,237,220,0.6); border:1px solid rgba(106,154,91,0.15); }
  .bubble.tier-1 .label { font-size:0.62rem; color:var(--text-light); }

  .bubble.tier-2 { width:88px; height:88px; background:rgba(226,237,220,0.8); border:1px solid rgba(106,154,91,0.25); }
  .bubble.tier-2 .label { font-size:0.72rem; }

  .bubble.tier-3 { width:115px; height:115px; background:rgba(226,237,220,0.95); border:1px solid rgba(106,154,91,0.35); box-shadow:0 0 20px rgba(106,154,91,0.12); }
  .bubble.tier-3 .label { font-size:0.82rem; font-weight:400; }

  /* sprouting = pulse animation */
  .bubble.sprouting {
    background:rgba(106,154,91,0.12);
    border-color:var(--accent);
    animation:pulse 3s ease-in-out infinite;
  }
  .bubble.sprouting .label { color:var(--accent); font-weight:500; }
  .bubble.sprouting::after {
    content:'🌱'; position:absolute; top:-6px; right:-4px; font-size:0.7rem;
  }

  @keyframes pulse {
    0%,100% { box-shadow:0 0 0 0 rgba(106,154,91,0.15); }
    50% { box-shadow:0 0 24px 6px rgba(106,154,91,0.2); }
  }

  /* ── Connection lines (SVG layer) ── */
  .connections {
    position:absolute; top:0; left:0; width:100%; height:100%;
    pointer-events:none; z-index:0;
  }
  .connections line {
    stroke:var(--border); stroke-width:1; opacity:0.5;
  }

  /* ── Expanded seed panel ── */
  .seed-panel {
    max-width:750px; margin:1rem auto;
    background:rgba(255,255,255,0.96);
    border-radius:12px;
    box-shadow:0 2px 20px rgba(0,0,0,0.1);
    padding:1.5rem;
    display:none;
  }
  .seed-panel.open { display:block; animation:fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .sp-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
  .sp-title { font-family:'Noto Serif SC',serif; font-size:1.1rem; color:var(--accent); }
  .sp-close { border:none; background:none; color:var(--text-muted); font-size:1.2rem; cursor:pointer; }
  .sp-close:hover { color:var(--text); }
  .sp-count { font-size:0.72rem; color:var(--text-muted); margin-bottom:1rem; }
  .sp-seed {
    background:var(--accent-soft); border-radius:8px;
    padding:0.8rem 1rem; margin-bottom:0.6rem;
  }
  .sp-seed .idea { font-size:0.88rem; color:var(--text); margin-bottom:0.3rem; line-height:1.6; }
  .sp-seed .meta { font-size:0.68rem; color:var(--text-muted); }
  .sp-status { margin-top:0.8rem; padding:0.6rem 1rem; border-radius:8px; font-size:0.78rem; }
  .sp-status.dormant { background:#f9f9f7; color:var(--text-muted); }
  .sp-status.growing { background:rgba(106,154,91,0.08); color:var(--accent); }
  .sp-status.sprouting { background:rgba(106,154,91,0.15); color:#4a7a42; }

  /* ── Footer ── */
  .card-footer {
    max-width:750px; margin:1.2rem auto 0;
    background:rgba(255,255,255,0.85);
    border-radius:12px; padding:1rem; text-align:center;
  }
  .card-footer .footer-inner { color:var(--text-muted); font-size:0.7rem; letter-spacing:0.05em; }

  @media(max-width:700px) {
    .seed-field-card, .seed-panel, .card-footer { margin-left:6px; margin-right:6px; border-radius:10px; }
    .header { padding:2.5rem 1rem 1.5rem; }
    .header h1 { font-size:2.8rem; }
    .bubble-field { height:300px; }
    .bubble.tier-1 { width:50px; height:50px; }
    .bubble.tier-1 .label { font-size:0.52rem; }
    .bubble.tier-2 { width:72px; height:72px; }
    .bubble.tier-2 .label { font-size:0.62rem; }
    .bubble.tier-3 { width:95px; height:95px; }
    .bubble.tier-3 .label { font-size:0.72rem; }
  }
</style>
</head>
<body>
<div class="page-scroll">

<div class="header">
  <h1>S.land</h1>
  <div class="sub">一个正在生长的空间 · 良渚</div>
</div>

<!-- 种子涌现区 -->
<div class="seed-field-card">
  <div class="section-head">
    <div class="div"></div>
    <h2>种子田</h2>
    <p>每颗种子都带着自己的方向，靠近的种子自然聚拢</p>
  </div>
  <div class="bubble-field" id="bubbleField">
    <svg class="connections" id="connSvg"></svg>
  </div>
</div>

<!-- 展开面板 -->
<div class="seed-panel" id="seedPanel"></div>

<div class="card-footer">
  <div class="footer-inner">📍 良渚 · S.land</div>
</div>

</div>

<script>
// ── Mock data: dimensions + seeds ──
const DIMENSIONS = [
  {
    id:'handcraft', name:'手作',
    seeds:[
      { idea:'想在4-3做一个手工皮具工作坊', who:'阿朵', time:'3天前' },
      { idea:'想学做银饰，三楼那个工作室可以教吗', who:'匿名', time:'5天前' },
      { idea:'陶艺体验，最好是周末下午', who:'小鱼', time:'1周前' },
      { idea:'木工，想自己做一把椅子', who:'大成', time:'2周前' },
    ],
    state:'sprouting' // ≥4 seeds
  },
  {
    id:'bodywork', name:'身体',
    seeds:[
      { idea:'女子防身术，最好是系统课', who:'Luna', time:'2天前' },
      { idea:'瑜伽，清晨那种', who:'匿名', time:'6天前' },
      { idea:'想找个地方跳舞，不是课，就是自由地跳', who:'阿花', time:'1周前' },
    ],
    state:'growing'
  },
  {
    id:'reading', name:'阅读',
    seeds:[
      { idea:'读书分享会，每周一次', who:'测试', time:'2天前' },
      { idea:'想组一个非虚构阅读小组', who:'鹿鸣', time:'4天前' },
      { idea:'诗歌朗读，晚上在露台', who:'匿名', time:'1周前' },
    ],
    state:'growing'
  },
  {
    id:'gathering', name:'松散聚集',
    seeds:[
      { idea:'有没有一个地方可以带孩子待一下午', who:'小何妈妈', time:'3天前' },
      { idea:'找一群人一起做点什么但不知道做什么', who:'匿名', time:'1周前' },
    ],
    state:'dormant'
  },
  {
    id:'nature', name:'自然',
    seeds:[
      { idea:'想在楼顶种菜', who:'村长', time:'1周前' },
      { idea:'做一个堆肥花园', who:'匿名', time:'2周前' },
    ],
    state:'dormant'
  },
  {
    id:'tech', name:'数字造物',
    seeds:[
      { idea:'Arduino 工作坊，做一个自己的小装置', who:'德宏', time:'4天前' },
    ],
    state:'dormant'
  },
  {
    id:'healing', name:'疗愈',
    seeds:[
      { idea:'冥想小组，每周定时', who:'匿名', time:'5天前' },
      { idea:'声音疗愈体验', who:'小满', time:'1周前' },
      { idea:'想要一个纯粹安静的空间，什么都不做', who:'匿名', time:'2周前' },
    ],
    state:'growing'
  },
  {
    id:'food', name:'食物',
    seeds:[
      { idea:'做饭局！每人带一道菜', who:'阿花', time:'3天前' },
    ],
    state:'dormant'
  },
];

// Related dimensions (for drawing connections)
const LINKS = [
  ['handcraft','bodywork'],
  ['bodywork','healing'],
  ['healing','gathering'],
  ['reading','gathering'],
  ['handcraft','tech'],
  ['nature','food'],
  ['nature','healing'],
];

// ── Layout: organic placement ──
function layoutBubbles() {
  const field = document.getElementById('bubbleField');
  const W = field.offsetWidth, H = field.offsetHeight;
  const placed = [];

  // Tier by seed count
  function tier(d) {
    if(d.seeds.length >= 4) return 3;
    if(d.seeds.length >= 2) return 2;
    return 1;
  }
  function radius(t) { return t===3?58:t===2?44:30; }

  // Sort: bigger first for better packing
  const sorted = [...DIMENSIONS].sort((a,b) => b.seeds.length - a.seeds.length);

  // Golden angle placement with collision avoidance
  const cx = W/2, cy = H/2;
  const goldenAngle = Math.PI * (3 - Math.sqrt(5));

  sorted.forEach((dim, i) => {
    const t = tier(dim);
    const r = radius(t);
    let bestX, bestY, tries = 0;
    // Spiral outward from center
    let spiralR = 40 + i * 32;
    let angle = i * goldenAngle;

    do {
      bestX = cx + spiralR * Math.cos(angle) + (Math.random()-0.5)*30;
      bestY = cy + spiralR * Math.sin(angle) + (Math.random()-0.5)*20;
      // Clamp
      bestX = Math.max(r+4, Math.min(W-r-4, bestX));
      bestY = Math.max(r+4, Math.min(H-r-4, bestY));
      tries++;
      spiralR += 8;
    } while(placed.some(p => Math.hypot(p.x-bestX, p.y-bestY) < p.r+r+10) && tries < 40);

    placed.push({ id:dim.id, x:bestX, y:bestY, r, tier:t });
    dim._x = bestX; dim._y = bestY; dim._tier = t;
  });

  // Render bubbles
  field.querySelectorAll('.bubble').forEach(b=>b.remove());
  DIMENSIONS.forEach(dim => {
    const el = document.createElement('div');
    el.className = `bubble tier-${dim._tier}${dim.state==='sprouting'?' sprouting':''}`;
    el.style.left = (dim._x - (dim._tier===3?57.5:dim._tier===2?44:30)) + 'px';
    el.style.top = (dim._y - (dim._tier===3?57.5:dim._tier===2?44:30)) + 'px';
    el.innerHTML = `<span class="label">${dim.name}</span>`;
    el.onclick = () => showPanel(dim);
    field.appendChild(el);
  });

  // Draw connection lines
  const svg = document.getElementById('connSvg');
  svg.innerHTML = '';
  LINKS.forEach(([a,b]) => {
    const da = DIMENSIONS.find(d=>d.id===a);
    const db = DIMENSIONS.find(d=>d.id===b);
    if(!da||!db) return;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', da._x);
    line.setAttribute('y1', da._y);
    line.setAttribute('x2', db._x);
    line.setAttribute('y2', db._y);
    svg.appendChild(line);
  });
}

function showPanel(dim) {
  const panel = document.getElementById('seedPanel');
  const stateLabel = { dormant:'安静生长中', growing:'逐渐聚拢', sprouting:'🌱 正在萌发 — 等待有人承接' };
  const stateClass = dim.state;

  let html = `<div class="sp-header">
    <span class="sp-title">${dim.name}</span>
    <button class="sp-close" onclick="closePanel()">×</button>
  </div>`;
  html += `<div class="sp-count">${dim.seeds.length} 颗种子围绕着这个方向</div>`;
  dim.seeds.forEach(s => {
    html += `<div class="sp-seed">
      <div class="idea">${s.idea}</div>
      <div class="meta">${s.who} · ${s.time}</div>
    </div>`;
  });
  html += `<div class="sp-status ${stateClass}">${stateLabel[dim.state]||''}</div>`;

  panel.innerHTML = html;
  panel.classList.add('open');
  panel.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function closePanel() {
  const panel = document.getElementById('seedPanel');
  panel.classList.remove('open');
  panel.innerHTML = '';
}

// Init
window.addEventListener('load', layoutBubbles);
window.addEventListener('resize', layoutBubbles);
</script>
</body>
</html>
