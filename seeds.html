<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.land · 种子田</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --card:#fff; --text:#333; --text-light:#8a9080; --text-muted:#b8bfb0;
    --accent:#6a9a5b; --accent-soft:#e2eddc; --border:#e4e8e0;
  }
  html,body { margin:0; padding:0; height:100%; }
  body {
    font-family:'Noto Sans SC',sans-serif;
    color:var(--text); line-height:1.7; font-weight:300;
    min-height:100vh; overflow-x:hidden;
  }
  body::before {
    content:''; position:fixed; top:0; left:0;
    width:100vw; height:100vh; z-index:-1;
    background:url('bg-desktop.jpg') center/cover no-repeat;
    background-color:#2a5a28;
  }
  @media(max-width:700px){ body::before { background-image:url('bg-mobile.jpg'); } }
  .page-scroll { position:relative; z-index:1; padding-bottom:2rem; }

  .header { text-align:center; padding:4rem 2rem 2rem; }
  .header h1 {
    font-family:'Noto Serif SC',serif; font-weight:600;
    font-size:4.5rem; letter-spacing:0.15em;
    color:#fff; text-shadow:0 4px 30px rgba(0,0,0,0.4);
  }
  .header .sub {
    color:rgba(255,255,255,0.9); font-size:1rem;
    letter-spacing:0.18em; text-shadow:0 2px 12px rgba(0,0,0,0.3); font-weight:300;
  }

  /* ── Card containers ── */
  .card-main {
    max-width:780px; margin:1.2rem auto;
    background:rgba(255,255,255,0.94); border-radius:14px;
    box-shadow:0 2px 20px rgba(0,0,0,0.08); padding:2rem 1.8rem;
  }
  .section-head { text-align:center; margin-bottom:1.8rem; }
  .section-head .div { width:32px; height:1px; background:var(--border); margin:0 auto 1rem; }
  .section-head h2 { font-family:'Noto Serif SC',serif; font-weight:400; font-size:1.15rem; color:var(--text); margin-bottom:0.3rem; }
  .section-head p { color:var(--text-light); font-size:0.8rem; }

  /* ── Legend ── */
  .legend {
    display:flex; justify-content:center; gap:1.5rem; flex-wrap:wrap;
    margin-bottom:1.5rem; font-size:0.68rem; color:var(--text-muted);
  }
  .legend-item { display:flex; align-items:center; gap:0.35rem; }
  .legend-dot { width:10px; height:10px; border-radius:50%; }
  .legend-dot.l-gather { background:rgba(106,154,91,0.2); border:1px solid rgba(106,154,91,0.3); }
  .legend-dot.l-sprout { background:rgba(106,154,91,0.35); border:1px solid var(--accent); animation:lpulse 2s infinite; }
  .legend-dot.l-grow { background:rgba(106,154,91,0.5); border:1px solid var(--accent); }
  .legend-dot.l-ripe { background:rgba(212,175,55,0.4); border:1px solid rgba(180,140,60,0.6); }
  @keyframes lpulse { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 4px rgba(106,154,91,0.5)} }

  /* ── Bubble field ── */
  .bubble-field { position:relative; width:100%; height:420px; margin:0 auto; overflow:hidden; }

  /* SVG connections */
  .connections { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
  .connections line { stroke:var(--border); stroke-width:1; opacity:0.4; }

  /* ── Bubbles ── */
  .bubble {
    position:absolute; border-radius:50%;
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    cursor:pointer; text-align:center; user-select:none;
    transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.4s;
  }
  .bubble:hover { transform:scale(1.1); z-index:10; }
  .bubble .label { font-family:'Noto Serif SC',serif; line-height:1.2; pointer-events:none; }

  /* ── Stage: 聚拢 ── */
  .bubble.stage-gather {
    background:rgba(226,237,220,0.5); border:1px solid rgba(106,154,91,0.15);
  }
  .bubble.stage-gather .label { font-size:0.7rem; color:var(--text-light); }

  /* ── Stage: 萌发 ── */
  .bubble.stage-sprout {
    background:rgba(226,237,220,0.8); border:1.5px solid var(--accent);
    animation:sproutPulse 3s ease-in-out infinite;
  }
  .bubble.stage-sprout .label { font-size:0.8rem; color:var(--accent); font-weight:400; }
  .bubble.stage-sprout::after {
    content:'🌱'; position:absolute; top:-8px; right:-4px; font-size:0.75rem;
  }
  @keyframes sproutPulse {
    0%,100% { box-shadow:0 0 0 0 rgba(106,154,91,0.1); }
    50% { box-shadow:0 0 20px 5px rgba(106,154,91,0.18); }
  }

  /* ── Stage: 生长 ── */
  .bubble.stage-grow {
    background:rgba(106,154,91,0.15); border:2px solid var(--accent);
    box-shadow:0 2px 12px rgba(106,154,91,0.12);
  }
  .bubble.stage-grow .label { font-size:0.85rem; color:#4a7a42; font-weight:500; }
  .bubble.stage-grow .host-tag {
    font-size:0.5rem; color:var(--accent); background:rgba(106,154,91,0.1);
    padding:1px 6px; border-radius:8px; margin-top:3px; pointer-events:none;
  }

  /* ── Stage: 成熟 ── */
  .bubble.stage-ripe {
    background:rgba(212,175,55,0.12); border:2px solid rgba(180,140,60,0.5);
    box-shadow:0 2px 16px rgba(212,175,55,0.15);
  }
  .bubble.stage-ripe .label { font-size:0.85rem; color:#7a6520; font-weight:500; }
  .bubble.stage-ripe::after {
    content:'✨'; position:absolute; top:-8px; right:-4px; font-size:0.75rem;
  }
  .bubble.stage-ripe .cal-tag {
    font-size:0.48rem; color:#8a7040; background:rgba(212,175,55,0.15);
    padding:1px 6px; border-radius:8px; margin-top:3px; pointer-events:none;
  }

  /* ── Size tiers ── */
  .bubble.size-s { width:64px; height:64px; }
  .bubble.size-m { width:92px; height:92px; }
  .bubble.size-l { width:120px; height:120px; }

  /* ── Detail panel ── */
  .detail-panel {
    max-width:780px; margin:1rem auto;
    background:rgba(255,255,255,0.96); border-radius:14px;
    box-shadow:0 2px 20px rgba(0,0,0,0.1); padding:1.5rem 1.8rem;
    display:none;
  }
  .detail-panel.open { display:block; animation:fadeUp 0.3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

  .dp-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:0.8rem; }
  .dp-title { font-family:'Noto Serif SC',serif; font-size:1.15rem; }
  .dp-close { border:none; background:none; color:var(--text-muted); font-size:1.3rem; cursor:pointer; line-height:1; }
  .dp-close:hover { color:var(--text); }
  .dp-stage-badge {
    display:inline-block; font-size:0.68rem; padding:0.2rem 0.7rem;
    border-radius:12px; margin-bottom:1rem;
  }
  .dp-stage-badge.gather { background:#f0f4ed; color:var(--text-muted); }
  .dp-stage-badge.sprout { background:var(--accent-soft); color:var(--accent); }
  .dp-stage-badge.grow { background:var(--accent-soft); color:#4a7a42; }
  .dp-stage-badge.ripe { background:#f5eedd; color:#7a6520; }

  .dp-desc { color:var(--text-light); font-size:0.82rem; margin-bottom:1.2rem; line-height:1.8; }

  .dp-seeds { margin-bottom:1rem; }
  .dp-seeds h4 { font-size:0.72rem; color:var(--text-muted); letter-spacing:0.08em; margin-bottom:0.5rem; font-weight:400; }
  .seed-item {
    background:#f8faf6; border-radius:8px; padding:0.7rem 1rem; margin-bottom:0.4rem;
    border-left:2px solid var(--accent-soft);
  }
  .seed-item .idea { font-size:0.84rem; color:var(--text); line-height:1.5; }
  .seed-item .meta { font-size:0.65rem; color:var(--text-muted); margin-top:0.2rem; }

  /* grow-specific */
  .dp-host { display:flex; align-items:center; gap:0.8rem; background:#f4f8f2; border-radius:10px; padding:1rem; margin-bottom:1rem; }
  .dp-host-avatar { width:40px; height:40px; border-radius:50%; background:var(--accent-soft); display:flex; align-items:center; justify-content:center; font-size:1rem; }
  .dp-host-info .name { font-size:0.9rem; font-weight:400; color:var(--text); }
  .dp-host-info .role { font-size:0.68rem; color:var(--accent); }
  .dp-progress { font-size:0.82rem; color:var(--text-light); line-height:1.8; }

  /* ripe-specific */
  .dp-event { background:#faf7ef; border-radius:10px; padding:1rem; margin-bottom:1rem; }
  .dp-event h4 { font-size:0.72rem; color:#8a7040; letter-spacing:0.08em; margin-bottom:0.5rem; font-weight:400; }
  .dp-event .info { font-size:0.88rem; color:var(--text); line-height:1.8; }
  .dp-cal-link {
    display:inline-block; font-size:0.78rem; color:var(--accent);
    border:1px solid var(--accent); border-radius:6px;
    padding:0.35rem 1rem; margin-top:0.5rem; text-decoration:none;
    transition:all 0.2s;
  }
  .dp-cal-link:hover { background:var(--accent); color:#fff; }

  .card-footer {
    max-width:780px; margin:1.2rem auto 0;
    background:rgba(255,255,255,0.85); border-radius:12px;
    padding:1rem; text-align:center;
  }
  .card-footer .fi { color:var(--text-muted); font-size:0.7rem; letter-spacing:0.05em; }

  @media(max-width:700px) {
    .card-main,.detail-panel,.card-footer { margin-left:6px; margin-right:6px; }
    .header { padding:2.5rem 1rem 1.5rem; }
    .header h1 { font-size:2.8rem; }
    .bubble-field { height:340px; }
    .bubble.size-s { width:52px; height:52px; }
    .bubble.size-m { width:76px; height:76px; }
    .bubble.size-l { width:100px; height:100px; }
    .bubble .label { font-size:0.6rem !important; }
    .legend { gap:0.8rem; font-size:0.58rem; }
  }
</style>
</head>
<body>
<div class="page-scroll">

<div class="header">
  <h1>S.land</h1>
  <div class="sub">一个正在生长的空间 · 良渚</div>
</div>

<div class="card-main">
  <div class="section-head">
    <div class="div"></div>
    <h2>种子田</h2>
    <p>每颗种子都带着自己的方向，靠近的种子自然聚拢</p>
  </div>

  <div class="legend">
    <div class="legend-item"><span class="legend-dot l-gather"></span>聚拢</div>
    <div class="legend-item"><span class="legend-dot l-sprout"></span>萌发</div>
    <div class="legend-item"><span class="legend-dot l-grow"></span>生长</div>
    <div class="legend-item"><span class="legend-dot l-ripe"></span>成熟</div>
  </div>

  <div class="bubble-field" id="field">
    <svg class="connections" id="svg"></svg>
  </div>
</div>

<div class="detail-panel" id="panel"></div>

<div class="card-footer"><div class="fi">📍 良渚 · S.land</div></div>

</div>

<script>
const DATA = [
  {
    id:'handcraft', name:'手作', stage:'grow', size:'l',
    seeds:[
      { idea:'想在4-3做一个手工皮具工作坊', who:'阿朵', time:'3周前' },
      { idea:'想学做银饰，听说三楼有工作室', who:'匿名', time:'3周前' },
      { idea:'陶艺体验，周末下午', who:'小鱼', time:'4周前' },
      { idea:'木工，想自己做一把椅子', who:'大成', time:'1个月前' },
      { idea:'扎染围巾，最好人少一点', who:'莲子', time:'1个月前' },
    ],
    host:{ name:'阿朵', emoji:'🧶' },
    progress:'正在和三楼银饰工作室谈合作，计划先办一场体验日，包含皮具+银饰+陶艺三个工位。',
  },
  {
    id:'bodywork', name:'身体', stage:'sprout', size:'l',
    seeds:[
      { idea:'女子防身术，最好是系统课', who:'Luna', time:'2周前' },
      { idea:'瑜伽，清晨那种', who:'匿名', time:'3周前' },
      { idea:'想找个地方跳舞，不是课，就是自由地跳', who:'阿花', time:'3周前' },
      { idea:'太极，傍晚在露台', who:'张叔', time:'1个月前' },
    ],
  },
  {
    id:'reading', name:'阅读', stage:'sprout', size:'m',
    seeds:[
      { idea:'读书分享会，每周一次', who:'鹿鸣', time:'1周前' },
      { idea:'想组一个非虚构阅读小组', who:'匿名', time:'2周前' },
      { idea:'诗歌朗读，晚上在露台', who:'匿名', time:'3周前' },
    ],
  },
  {
    id:'nature', name:'自然', stage:'gather', size:'m',
    seeds:[
      { idea:'想在楼顶种菜', who:'村长', time:'2周前' },
      { idea:'做一个堆肥花园', who:'匿名', time:'3周前' },
    ],
  },
  {
    id:'healing', name:'疗愈', stage:'sprout', size:'m',
    seeds:[
      { idea:'冥想小组，每周定时', who:'匿名', time:'2周前' },
      { idea:'声音疗愈体验', who:'小满', time:'3周前' },
      { idea:'想要一个纯粹安静的空间，什么都不做', who:'匿名', time:'1个月前' },
    ],
  },
  {
    id:'food', name:'食物', stage:'ripe', size:'l',
    seeds:[
      { idea:'做饭局！每人带一道菜', who:'阿花', time:'2个月前' },
      { idea:'想学做面包', who:'小何妈妈', time:'2个月前' },
      { idea:'野餐，春天在楼下草坪', who:'匿名', time:'2个月前' },
      { idea:'咖啡品鉴，自带豆子', who:'德宏', time:'2个月前' },
    ],
    host:{ name:'阿花', emoji:'🍳' },
    event:{ name:'每人一道菜·春日饭局', date:'4月20日（周日）11:30', place:'4-2 共创空间', slots:'已报名 8/12 人' },
  },
  {
    id:'gathering', name:'松散聚集', stage:'gather', size:'s',
    seeds:[
      { idea:'有没有一个地方可以带孩子待一下午', who:'小何妈妈', time:'2周前' },
    ],
  },
  {
    id:'tech', name:'数字造物', stage:'gather', size:'s',
    seeds:[
      { idea:'Arduino 工作坊，做一个自己的小装置', who:'德宏', time:'3周前' },
    ],
  },
];

const LINKS = [
  ['handcraft','bodywork'], ['bodywork','healing'],
  ['healing','nature'], ['reading','gathering'],
  ['handcraft','tech'], ['nature','food'],
];

const STAGE_LABEL = { gather:'聚拢中', sprout:'萌发中', grow:'生长中', ripe:'已成熟' };
const STAGE_COLOR = { gather:'#4a7a42', sprout:'#4a7a42', grow:'#4a7a42', ripe:'#7a6520' };

function layout() {
  const field = document.getElementById('field');
  const W = field.offsetWidth, H = field.offsetHeight;
  const sizeR = { s:32, m:46, l:60 };
  const sorted = [...DATA].sort((a,b) => b.seeds.length - a.seeds.length);
  const placed = [];
  const golden = Math.PI*(3-Math.sqrt(5));

  sorted.forEach((d,i) => {
    const r = sizeR[d.size];
    let spiral = 50 + i*38, angle = i*golden, x, y, tries=0;
    do {
      x = W/2 + spiral*Math.cos(angle) + (Math.random()-0.5)*25;
      y = H/2 + spiral*Math.sin(angle) + (Math.random()-0.5)*20;
      x = Math.max(r+6, Math.min(W-r-6, x));
      y = Math.max(r+6, Math.min(H-r-6, y));
      tries++; spiral += 10;
    } while(placed.some(p=>Math.hypot(p.x-x,p.y-y)<p.r+r+14) && tries<50);
    placed.push({id:d.id,x,y,r});
    d._x=x; d._y=y;
  });

  field.querySelectorAll('.bubble').forEach(b=>b.remove());
  DATA.forEach(d => {
    const el = document.createElement('div');
    el.className = `bubble stage-${d.stage} size-${d.size}`;
    const r = sizeR[d.size];
    el.style.left = (d._x-r)+'px';
    el.style.top = (d._y-r)+'px';

    let inner = `<span class="label">${d.name}</span>`;
    if(d.stage==='grow' && d.host) {
      inner += `<span class="host-tag">${d.host.emoji} ${d.host.name}</span>`;
    }
    if(d.stage==='ripe') {
      inner += `<span class="cal-tag">已进入日历</span>`;
    }

    el.innerHTML = inner;
    el.onclick = () => showDetail(d);
    field.appendChild(el);
  });

  const svg = document.getElementById('svg');
  svg.innerHTML = '';
  LINKS.forEach(([a,b]) => {
    const da=DATA.find(d=>d.id===a), db=DATA.find(d=>d.id===b);
    if(!da||!db) return;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',da._x); line.setAttribute('y1',da._y);
    line.setAttribute('x2',db._x); line.setAttribute('y2',db._y);
    svg.appendChild(line);
  });
}

function showDetail(d) {
  const p = document.getElementById('panel');
  let h = `<div class="dp-header">
    <span class="dp-title" style="color:${STAGE_COLOR[d.stage]}">${d.name}</span>
    <button class="dp-close" onclick="closePanel()">×</button>
  </div>`;
  h += `<span class="dp-stage-badge ${d.stage}">${STAGE_LABEL[d.stage]} · ${d.seeds.length} 颗种子</span>`;

  if(d.stage==='gather') {
    h += `<div class="dp-desc">种子正在安静聚拢。当更多相似的想法汇聚到这个方向，它会自然萌发。</div>`;
  }
  if(d.stage==='sprout') {
    h += `<div class="dp-desc">这个方向已经聚集了足够多的能量，正在萌发中。</div>`;
  }
  if(d.stage==='grow') {
    h += `<div class="dp-host">
      <div class="dp-host-avatar">${d.host.emoji}</div>
      <div class="dp-host-info">
        <div class="name">${d.host.name}</div>
        <div class="role">主理人</div>
      </div>
    </div>`;
    h += `<div class="dp-progress">${d.progress}</div>`;
  }
  if(d.stage==='ripe') {
    h += `<div class="dp-host">
      <div class="dp-host-avatar">${d.host.emoji}</div>
      <div class="dp-host-info">
        <div class="name">${d.host.name}</div>
        <div class="role">主理人</div>
      </div>
    </div>`;
    h += `<div class="dp-event">
      <h4>活动</h4>
      <div class="info">
        <strong>${d.event.name}</strong><br>
        📅 ${d.event.date}<br>
        📍 ${d.event.place}<br>
        ${d.event.slots}
      </div>
    </div>`;
    h += `<a class="dp-cal-link" href="#">查看排期 →</a>`;
  }

  h += `<div class="dp-seeds"><h4>种子</h4>`;
  d.seeds.forEach(s => {
    h += `<div class="seed-item">
      <div class="idea">${s.idea}</div>
      <div class="meta">${s.who} · ${s.time}</div>
    </div>`;
  });
  h += `</div>`;

  p.innerHTML = h;
  p.classList.add('open');
  p.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function closePanel() {
  const p = document.getElementById('panel');
  p.classList.remove('open');
  p.innerHTML = '';
}

window.addEventListener('load', layout);
window.addEventListener('resize', layout);
</script>
</body>
</html>
